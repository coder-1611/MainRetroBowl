            gap: 16px;
            margin-bottom: 6px;
        }
        .setting-row:last-child {
            margin-bottom: 0;
        }
        .setting-row label {
            font-size: 12px;
            white-space: nowrap;
        }
        .toggle {
            position: relative;
            width: 34px;
            height: 18px;
            background: #333;
            border-radius: 9px;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .toggle.on {
            background: #e94560;
        }
        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            transition: left 0.2s;
        }
        .toggle.on::after {
            left: 18px;
        }
    </style>
</head>
