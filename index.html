        }

            color: #00ff00;

            width: 100%;
            height: 100%;

            z-index: 9999;

            color: #e94560;
            border: 2px solid #e94560;
            border-radius: 8px;
            padding: 8px 14px;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.85;
            transition: opacity 0.2s, transform 0.1s;
        }
        .cheat-btn:hover {
            opacity: 1;
            transform: scale(1.05);
        }
        #credits-btn {
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
        }
        #credits-btn:hover {
            transform: translateX(-50%) scale(1.05);
        }
        #max-btn {

    </style>
